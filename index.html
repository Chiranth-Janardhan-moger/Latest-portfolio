    <!-- Domain Alignment Script for Vercel Deployments -->
    <script>
      (function() {
        try {
          var currentOrigin = window.location.origin;
          if (currentOrigin && !currentOrigin.includes('localhost') && !currentOrigin.includes('127.0.0.1')) {
            // Update Canonical
            var canonicalEl = document.getElementById('meta-canonical');
            if (canonicalEl) {
              canonicalEl.setAttribute('href', currentOrigin + '/');
            }
            // Update Open Graph
            var ogUrlEl = document.getElementById('meta-og-url');
            if (ogUrlEl) {
              ogUrlEl.setAttribute('content', currentOrigin + '/');
            }
            var ogImageEl = document.getElementById('meta-og-image');
            if (ogImageEl) {
              ogImageEl.setAttribute('content', currentOrigin + '/assets/og-image.png');
            }
            // Update Twitter
            var twUrlEl = document.getElementById('meta-twitter-url');
            if (twUrlEl) {
              twUrlEl.setAttribute('content', currentOrigin + '/');
            }
            var twImageEl = document.getElementById('meta-twitter-image');
            if (twImageEl) {
              twImageEl.setAttribute('content', currentOrigin + '/assets/og-image.png');
            }
            // Update JSON-LD Structured Data
            var jsonLdEl = document.querySelector('script[type="application/ld+json"]');
            if (jsonLdEl) {
              try {
                var jsonLd = JSON.parse(jsonLdEl.innerHTML);
                jsonLd.url = currentOrigin + '/';
                jsonLd.image = currentOrigin + '/assets/og-image.png';
                jsonLdEl.innerHTML = JSON.stringify(jsonLd, null, 2);
              } catch(e) {}
            }
          }
        } catch(e) {
          console.error('SEO alignment script failed:', e);
        }
      })();
    </script>

    <script>
      // Suppress benign Vite HMR WebSocket connection errors in sandboxed preview environments
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          (event.reason.message && event.reason.message.toLowerCase().includes('websocket')) ||
          (typeof event.reason === 'string' && event.reason.toLowerCase().includes('websocket'))
        )) {
          event.preventDefault();
          event.stopPropagation();
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && event.message.toLowerCase().includes('websocket')) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);
    </script>
